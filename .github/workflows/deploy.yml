name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject Supabase config from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
              echo "::warning::SUPABASE_URL / SUPABASE_ANON_KEY secrets not set — config.js will not be generated. Cloud storage will be disabled in the deployed site. To enable, add the secrets in Settings → Secrets and variables → Actions and re-run."
              # 不產生 config.js，讓前端 <script src="config.js" onerror="..."> 分支生效
              exit 0
          fi
          # 使用 jq 安全地把 secret 序列化為 JS string literal，避免引號或反斜線問題
          URL_JSON=$(printf '%s' "$SUPABASE_URL" | jq -Rs .)
          KEY_JSON=$(printf '%s' "$SUPABASE_ANON_KEY" | jq -Rs .)
          cat > config.js <<EOF
          // Generated by .github/workflows/deploy.yml — do not edit
          window.SUPABASE_CONFIG = {
              url: ${URL_JSON},
              anonKey: ${KEY_JSON},
          };
          EOF
          echo "Generated config.js (URL length=${#SUPABASE_URL}, KEY length=${#SUPABASE_ANON_KEY})"
          if [ -n "$GOOGLE_MAPS_API_KEY" ]; then
              GMAPS_KEY_JSON=$(printf '%s' "$GOOGLE_MAPS_API_KEY" | jq -Rs .)
              cat >> config.js <<EOF
          window.GOOGLE_CONFIG = {
              mapsApiKey: ${GMAPS_KEY_JSON},
          };
          EOF
              echo "Appended GOOGLE_CONFIG (KEY length=${#GOOGLE_MAPS_API_KEY})"
          else
              echo "GOOGLE_MAPS_API_KEY not set — Google Places features will be disabled in the deployed site."
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
