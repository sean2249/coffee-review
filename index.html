<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咖啡記錄 (CoE)</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0e4d4d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="咖啡記錄">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main id="app" class="container"></main>

    <nav class="tabbar" aria-label="主功能">
        <a class="tabbar-btn" data-route="/records" href="#/records">
            <i class="bi bi-collection"></i><span>記錄</span>
        </a>
        <a class="tabbar-btn" data-route="/new" href="#/new">
            <i class="bi bi-plus-circle"></i><span>新增</span>
        </a>
        <a class="tabbar-btn" data-route="/shops" href="#/shops">
            <i class="bi bi-shop"></i><span>店家</span>
        </a>
    </nav>

    <!-- ─── Form template — used by both 杯測 and 品鑑 ─────────────────────── -->
    <template id="tpl-form">
        <form class="record-form" novalidate>

            <!-- Shop selector (shared) -->
            <div class="card">
                <div class="card-body">
                    <h3 class="card-title"><i class="bi bi-shop"></i>店家</h3>
                    <div class="mb-2">
                        <label for="f-shop" class="form-label">
                            <span data-mode-text="cupping">豆源（店家）</span>
                            <span data-mode-text="tasting">店家 *</span>
                        </label>
                        <div class="shop-picker">
                            <select class="form-select" id="f-shop"></select>
                            <button type="button" class="btn btn-outline-secondary" id="f-shop-new" title="新增店家">
                                <i class="bi bi-plus-lg"></i>
                            </button>
                        </div>
                        <div class="small-hint" data-mode-text="cupping">未填表示自家或來源不明。</div>
                    </div>
                </div>
            </div>

            <!-- Cupping-only: bean info + brewing params -->
            <div class="card" data-mode-only="cupping">
                <div class="card-body">
                    <h3 class="card-title"><i class="bi bi-info-circle"></i>咖啡資訊</h3>
                    <div class="row g-2">
                        <div class="col-12">
                            <label class="form-label">豆子類型 *</label>
                            <div class="bean-type-chip-row" data-bean-type-group="cupping"
                                 role="group" aria-label="豆子類型">
                                <button type="button" class="bean-type-chip"
                                        data-bean-type="single" aria-pressed="false">
                                    <i class="bi bi-droplet"></i>單品
                                </button>
                                <button type="button" class="bean-type-chip"
                                        data-bean-type="blend" aria-pressed="false">
                                    <i class="bi bi-collection"></i>配方豆
                                </button>
                            </div>
                        </div>
                        <div class="col-12" data-import-bean="cupping" hidden>
                            <label for="f-import-bean-cupping" class="form-label">
                                <i class="bi bi-arrow-down-square"></i>從此咖啡廳已記錄的豆子帶入
                            </label>
                            <select class="form-select" id="f-import-bean-cupping">
                                <option value="">— 不帶入 —</option>
                            </select>
                            <div class="small-hint">沖煮參數不會帶入；只帶入豆子基本資訊。</div>
                        </div>
                        <div class="col-md-6 col-12" data-bean-type-only="cupping:single">
                            <label for="f-origin" class="form-label">國家</label>
                            <input type="text" class="form-control" id="f-origin"
                                   list="origin-options" placeholder="選擇或輸入國家">
                            <datalist id="origin-options"></datalist>
                        </div>
                        <div class="col-12" data-bean-type-only="cupping:single">
                            <label class="form-label">處理法</label>
                            <div class="process-chip-row" role="group" aria-label="處理法"></div>
                            <input type="text" class="form-control mt-2" id="f-process"
                                   placeholder="或自行輸入">
                        </div>
                        <div class="col-12" data-bean-type-only="cupping:blend">
                            <label for="f-blend_composition" class="form-label">配方組成</label>
                            <textarea class="form-control" id="f-blend_composition" rows="2"
                                      placeholder="例：50% 巴西黃波旁 + 30% 衣索比亞耶加雪菲 + 20% 哥倫比亞蕙蘭"></textarea>
                        </div>
                        <div class="col-12" data-bean-type-only="cupping:any">
                            <label for="f-cupping-bean" class="form-label">
                                <span data-bean-type-text="cupping:single">咖啡名稱 / 豆名 *</span>
                                <span data-bean-type-text="cupping:blend">配方名稱 *</span>
                            </label>
                            <input type="text" class="form-control" id="f-cupping-bean"
                                   placeholder="例：衣索比亞 耶加雪菲 G1">
                        </div>
                        <div class="col-12" data-bean-type-only="cupping:any">
                            <label class="form-label d-block">烘焙度</label>
                            <div class="roast-radio-row" role="radiogroup" aria-label="烘焙度">
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="roast" id="f-roast-light" value="淺焙">
                                    <label class="form-check-label" for="f-roast-light">淺焙</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="roast" id="f-roast-medium-light" value="中淺焙">
                                    <label class="form-check-label" for="f-roast-medium-light">中淺焙</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="roast" id="f-roast-medium" value="中焙">
                                    <label class="form-check-label" for="f-roast-medium">中焙</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="roast" id="f-roast-medium-dark" value="中深焙">
                                    <label class="form-check-label" for="f-roast-medium-dark">中深焙</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="roast" id="f-roast-dark" value="深焙">
                                    <label class="form-check-label" for="f-roast-dark">深焙</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card" data-mode-only="cupping">
                <div class="card-body">
                    <button type="button"
                            class="card-title card-title-collapsible collapsed"
                            data-bs-toggle="collapse" data-bs-target="#brewingParams"
                            aria-expanded="false" aria-controls="brewingParams">
                        <i class="bi bi-sliders"></i>
                        <span>沖煮參數</span>
                        <i class="bi bi-chevron-down card-toggle-chevron"></i>
                    </button>
                    <div id="brewingParams" class="collapse">
                        <div class="row g-2 pt-2">
                            <div class="col-12">
                                <label class="form-label">方法</label>
                                <div class="brewing-method-chip-row" role="group" aria-label="沖煮方法">
                                    <button type="button" class="brewing-method-chip"
                                            data-method="耳掛包" aria-pressed="false">
                                        <i class="bi bi-bag"></i>耳掛包
                                    </button>
                                    <button type="button" class="brewing-method-chip"
                                            data-method="手沖" aria-pressed="false">
                                        <i class="bi bi-cup-hot"></i>手沖
                                    </button>
                                </div>
                                <input type="text" class="form-control mt-2" id="f-method"
                                       placeholder="或自行輸入（V60、義式、冰滴⋯）">
                            </div>
                            <div class="col-md-4 col-6">
                                <label for="f-grind" class="form-label">研磨度</label>
                                <input type="text" class="form-control" id="f-grind">
                            </div>
                            <div class="col-md-4 col-6">
                                <label for="f-water_temp" class="form-label">水溫 (°C)</label>
                                <input type="number" class="form-control" id="f-water_temp">
                            </div>
                            <div class="col-md-4 col-6">
                                <label for="f-ratio" class="form-label">粉水比</label>
                                <input type="text" class="form-control" id="f-ratio">
                            </div>
                            <div class="col-md-4 col-6">
                                <label for="f-extraction_time" class="form-label">萃取時間 (s)</label>
                                <input type="number" class="form-control" id="f-extraction_time">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tasting-only: visit details -->
            <div class="card" data-mode-only="tasting">
                <div class="card-body">
                    <h3 class="card-title"><i class="bi bi-journal-text"></i>品鑑資訊</h3>
                    <div class="row g-2">
                        <div class="col-md-4 col-6">
                            <label for="f-visit_date" class="form-label">日期</label>
                            <input type="date" class="form-control" id="f-visit_date">
                        </div>
                        <div class="col-md-4 col-6">
                            <label for="f-price" class="form-label">價格</label>
                            <input type="number" class="form-control" id="f-price" min="0" step="1">
                        </div>
                        <div class="col-12">
                            <label for="f-item_ordered" class="form-label">點用品項</label>
                            <input type="text" class="form-control" id="f-item_ordered"
                                   placeholder="例：V60 衣索比亞耶加雪菲 / 拿鐵">
                        </div>
                        <div class="col-12">
                            <label class="form-label">豆子類型 *</label>
                            <div class="bean-type-chip-row" data-bean-type-group="tasting"
                                 role="group" aria-label="豆子類型">
                                <button type="button" class="bean-type-chip"
                                        data-bean-type="single" aria-pressed="false">
                                    <i class="bi bi-droplet"></i>單品
                                </button>
                                <button type="button" class="bean-type-chip"
                                        data-bean-type="blend" aria-pressed="false">
                                    <i class="bi bi-collection"></i>配方豆
                                </button>
                            </div>
                        </div>
                        <div class="col-12" data-import-bean="tasting" hidden>
                            <label for="f-import-bean-tasting" class="form-label">
                                <i class="bi bi-arrow-down-square"></i>從此咖啡廳已記錄的豆子帶入
                            </label>
                            <select class="form-select" id="f-import-bean-tasting">
                                <option value="">— 不帶入 —</option>
                            </select>
                        </div>
                        <div class="col-md-6 col-12" data-bean-type-only="tasting:any">
                            <label for="f-tasting-bean" class="form-label">品項豆子名</label>
                            <input type="text" class="form-control" id="f-tasting-bean"
                                   placeholder="例：衣索比亞 耶加雪菲">
                        </div>
                        <div class="col-md-6 col-12">
                            <label for="f-brewing_method" class="form-label">沖煮方式</label>
                            <input type="text" class="form-control" id="f-brewing_method"
                                   placeholder="例：V60 / 義式 / 冰滴">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tasting-only: vibe/decor/service chips + notes -->
            <div class="card" data-mode-only="tasting">
                <div class="card-body">
                    <h3 class="card-title"><i class="bi bi-emoji-smile"></i>探訪心得</h3>
                    <div id="tagSections"></div>
                </div>
            </div>

            <!-- CoE total (shared) -->
            <div class="card coe-card">
                <div class="card-body">
                    <h3 class="card-title"><i class="bi bi-award-fill"></i>CoE 總分</h3>
                    <div id="medalRow" class="medal-row" role="group" aria-label="徽章等級"></div>
                    <div id="scoreChipRow" class="score-chip-row" role="group" aria-label="分數選擇"></div>
                    <div class="coe-total-block">
                        <span class="coe-total-display" id="coeTotalDisplay">82.0</span>
                        <span class="coe-total-of">/ 100</span>
                        <span class="coe-total-tier-badge" id="coeTotalTierBadge">[ 銅獎 ]</span>
                        <span class="coe-total-desc" id="coeTotalDesc">合格精品，日常品飲的選擇</span>
                    </div>
                </div>
            </div>

            <!-- Sensory accordion (shared) -->
            <div class="card">
                <div class="card-body">
                    <h3 class="card-title"><i class="bi bi-bookmark-star-fill"></i>感官評估</h3>
                    <div class="evaluation-estimated-total">
                        <span class="evaluation-estimated-label">預估總分</span>
                        <span class="evaluation-estimated-value" id="evalEstimatedValue">76.0</span>
                        <span class="evaluation-estimated-of">/ 100</span>
                        <span class="evaluation-estimated-tier" id="evalEstimatedTier"></span>
                        <span class="evaluation-estimated-hint">參考用，依下方 8 項分數估算（36 + 加總）</span>
                    </div>
                    <div class="accordion accordion-flush" id="evaluationAccordion"></div>
                </div>
            </div>

            <!-- Action buttons -->
            <div class="action-bar">
                <button type="button" class="btn btn-outline-danger" id="f-delete" hidden>
                    <i class="bi bi-trash me-1"></i>刪除
                </button>
                <button type="submit" class="btn btn-info" id="f-save">
                    <i class="bi bi-cloud-arrow-up me-1"></i><span id="f-save-label">儲存</span>
                </button>
            </div>
        </form>
    </template>

    <!-- ─── Shop modal ─────────────────────────────────────────────────────── -->
    <template id="tpl-shop-modal">
        <div class="modal-backdrop-custom">
            <div class="modal-shell" role="dialog" aria-modal="true" aria-labelledby="shop-modal-title">
                <header class="modal-header">
                    <h3 id="shop-modal-title">新增店家</h3>
                    <button type="button" class="modal-close" aria-label="關閉">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </header>
                <form class="modal-body" id="shop-modal-form">
                    <div class="mb-2 sm-place-row" hidden>
                        <label class="form-label">Google Places 搜尋</label>
                        <div id="sm-place-mount" class="sm-place-mount"></div>
                        <div class="form-text">選定後會自動帶入店名與地址，下方欄位仍可手動修改。</div>
                    </div>
                    <div class="mb-2">
                        <label for="sm-name" class="form-label">店家名稱 *</label>
                        <input type="text" class="form-control" id="sm-name" required maxlength="120">
                    </div>
                    <div class="mb-2">
                        <label for="sm-location" class="form-label">位置</label>
                        <input type="text" class="form-control" id="sm-location" placeholder="例：台北市大安區">
                    </div>
                    <div class="mb-2">
                        <label for="sm-intro" class="form-label">介紹 / 備註</label>
                        <textarea class="form-control" id="sm-intro" rows="3"></textarea>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn btn-outline-secondary" data-action="cancel">取消</button>
                        <button type="submit" class="btn btn-primary">儲存</button>
                    </div>
                </form>
            </div>
        </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js" onerror="console.info('config.js 不存在，雲端儲存將停用')"></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => {
                    console.warn('Service worker registration failed:', err);
                });
            });
        }
    </script>
</body>

</html>
