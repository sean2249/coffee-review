<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咖啡杯測記錄 (CoE)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container py-3">

        <header class="app-header">
            <div class="app-logo" aria-hidden="true"><i class="bi bi-cup-hot-fill"></i></div>
            <h1>咖啡杯測記錄</h1>
            <div class="app-subtitle">CoE 風格 · 兩段式徽章選分</div>
        </header>

        <div class="card">
            <div class="card-body">
                <h3 class="card-title"><i class="bi bi-folder2-open"></i>記錄管理</h3>
                <div class="input-group">
                    <select class="form-select" id="recordList" aria-label="選擇記錄"></select>
                    <button class="btn btn-outline-secondary" type="button" id="loadBtn">
                        <i class="bi bi-box-arrow-in-down me-1"></i>讀取
                    </button>
                    <button class="btn btn-outline-danger" type="button" id="deleteBtn">
                        <i class="bi bi-trash me-1"></i>刪除
                    </button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <h3 class="card-title"><i class="bi bi-info-circle"></i>咖啡資訊</h3>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="name" class="form-label">咖啡名稱</label>
                        <input type="text" class="form-control" id="name">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="origin" class="form-label">產地</label>
                        <input type="text" class="form-control" id="origin">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="process" class="form-label">處理法</label>
                        <input type="text" class="form-control" id="process">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="roast" class="form-label">烘焙度</label>
                        <input type="text" class="form-control" id="roast">
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <h3 class="card-title"><i class="bi bi-sliders"></i>沖煮參數</h3>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="grind" class="form-label">研磨度</label>
                        <input type="text" class="form-control" id="grind">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="water_temp" class="form-label">水溫 (°C)</label>
                        <input type="number" class="form-control" id="water_temp">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="ratio" class="form-label">粉水比</label>
                        <input type="text" class="form-control" id="ratio">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="method" class="form-label">沖煮方法</label>
                        <input type="text" class="form-control" id="method">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="extraction_time" class="form-label">萃取時間 (s)</label>
                        <input type="number" class="form-control" id="extraction_time">
                    </div>
                </div>
            </div>
        </div>

        <div class="card coe-card">
            <div class="card-body">
                <h3 class="card-title"><i class="bi bi-award-fill"></i>CoE 總分</h3>
                <div class="small-hint mb-2">先選徽章再選分數；下方各項僅供參考，不影響此分數。</div>
                <div id="tierChipRow" class="tier-chip-row" role="group" aria-label="徽章等級"></div>
                <div id="scoreChipRow" class="score-chip-row" role="group" aria-label="分數選擇"></div>
                <div class="coe-total-block">
                    <span class="coe-total-display" id="coeTotalDisplay">82.0</span>
                    <span class="coe-total-of"> / 100</span>
                    <span class="coe-total-tier-name" id="coeTotalTierName">— 一般精品（便利商店等級）</span>
                </div>
            </div>
        </div>

        <h3 class="section-heading"><i class="bi bi-bookmark-star-fill"></i>感官評估</h3>
        <div class="accordion" id="evaluationAccordion"></div>

        <div class="card">
            <div class="card-body">
                <h3 class="card-title"><i class="bi bi-exclamation-diamond"></i>瑕疵與備註</h3>
                <label for="defects" class="form-label">瑕疵記錄</label>
                <textarea id="defects" class="form-control mb-3" placeholder="記錄任何瑕疵，例如過度萃取、雜味等..." rows="3"></textarea>

                <label for="notes" class="form-label">最終備註</label>
                <textarea id="notes" class="form-control" placeholder="請輸入額外的備註..." rows="4"></textarea>
            </div>
        </div>

        <div class="action-bar">
            <button class="btn btn-info" id="saveBtn"><i class="bi bi-save me-1"></i>儲存記錄</button>
            <button class="btn btn-primary" id="generateBtn"><i class="bi bi-markdown me-1"></i>生成 Markdown</button>
            <button class="btn btn-success" id="copyBtn"><i class="bi bi-clipboard me-1"></i>複製 Markdown</button>
        </div>

        <div class="card">
            <div class="card-body">
                <h3 class="card-title"><i class="bi bi-filetype-md"></i>Markdown 輸出</h3>
                <pre id="markdownOutput"></pre>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
